critical_findings:
  - "Original code not released (CVPR June 2026) — re-implemented from equations"
  - "KV cache quantization must hook k_proj/v_proj, NOT model weights or past_key_values"
  - "transformers 5.x uses DynamicCache — tuple-hunting hooks silently fail"
  - "Paper uses unnormalized acc metric (~42%), NOT acc_norm (~54%)"
  - "Symmetric INT4 KV nearly lossless — errors cancel in attention sum (44.5% vs paper's 33.6%)"
  - "DWB controller learns importance (val_acc=45.6% vs 25% random)"

implementation:
  kv_cache_quant_version: v2
  approach: "Hook k_proj and v_proj Linear outputs directly"
  models_tested: [smollm-360m, smollm2-360m]
  quant_modes: [fp16, static4bit, static4bit_per_token, static4bit_asym, static8bit, static2bit]

