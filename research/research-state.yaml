project: dont-waste-bits-verification
created: "2026-04-19"
last_updated: "2026-04-19"

research_question: >
  Can we independently reproduce the claims of "Don't Waste Bits! Adaptive KV-Cache
  Quantization for Lightweight On-Device LLMs" (arXiv:2604.04722)?
  Specifically: (H1) 17.75% latency reduction, (H2) +7.60 accuracy points over
  static 4-bit KV, (H3) within 0.30 points of FP16 — all on SmolLM-360M / HellaSwag.

phase: CONCLUDED  # accuracy experiments complete; latency pending GPU

hypotheses:
  H1:
    slug: H1-latency-reduction
    claim: "17.75% decoding latency reduction vs static 4-bit KV (SmolLM-360M, HellaSwag)"
    arithmetic_check: "(2.93 - 2.41) / 2.93 * 100 = 17.75% — VERIFIED from paper Table 3"
    status: AWAITING_BREV  # UNTESTED | ARITHMETIC_VERIFIED | RUNNING | CONFIRMED | REFUTED
    prediction: Reproduces within ±2% of reported values
    priority: HIGH
    blocker: "RTX 4090 required on NVIDIA Brev"

  H2:
    slug: H2-accuracy-improvement
    claim: "+7.60 accuracy points over static 4-bit KV (SmolLM-360M, HellaSwag)"
    arithmetic_check: "41.20 - 33.60 = 7.60 — VERIFIED from paper Table 3"
    status: EXPLAINED
    note: >
      Standard INT4 (16 levels, scale=max/7) gives ~41-44% ≈ FP16 — lossless.
      int4_int3range (8 levels, scale=max/3) gives 33.0% ≈ paper's 33.6% baseline.
      Paper's "Static 4-bit KV" uses ~8 effective quantization levels (equivalent to INT3).
      H2 is technically explained: DWB does outperform a weaker-than-standard INT4 baseline.
    results:
      standard_int4_500samp: {per_tensor: 41.6, per_token: 41.2}
      int4_int3range_100samp: 33.0
      paper_kv4: 33.6
      paper_dwb: 41.2
    priority: HIGH

  H3:
    slug: H3-fp16-parity
    claim: "Within 0.30 points of FP16 (SmolLM-360M, HellaSwag)"
    arithmetic_check: "41.50 - 41.20 = 0.30 — VERIFIED from paper Table 3"
    status: IMPL_GAP  # our re-implementation falls short; paper's controller quality undisclosed
    note: >
      DEFINITIVE (500 samples, CI ±4.4pp): DWB 33.8% vs paper 41.2% = -7.4pp gap > CI.
      NOT reproduced by our implementation. Root cause: controller val_acc=36.6% insufficient.
      Standard INT4 (4.0 bits) gives 41.6%; our DWB v1 (5.03 avg bits) gives 33.8% — worse.
      v2 controller (val_acc=0.446) gives 37.0% at 8.47 avg bits — better accuracy but 1.68x more bits.
      Two-objective tension: quartile-classification training cannot simultaneously achieve 41.2% AND 5.05 bits.
      Paper's controller achieves both via undisclosed compound-loss training.
    results:
      dwb_100samp: 40.0
      dwb_200samp: 38.0
      dwb_500samp_v1: 33.8
      dwb_500samp_v2: 37.0
      fp16_500samp: 42.6
      delta_500samp_v1: -7.4
      delta_500samp_v2: -4.2
      ci_500samp: "±4.4pp"
      controller_v1_val_acc: 0.366
      controller_v2_val_acc: 0.446
      avg_bits_v1: 5.03
      avg_bits_v2: 8.47
      bit_dist_v1: {2: 47.9, 4: 25.3, 8: 15.4, 16: 11.4}
      bit_dist_v2: {2: 41.7, 4: 9.3, 8: 7.2, 16: 41.8}
    priority: HIGH

  H4:
    slug: H4-additional-models
    claim: "Results hold across SmolLM-135M and SmolLM-1.7B"
    status: CONFIRMED  # 135M tested; 1.7B not yet
    priority: MEDIUM
    results:
      smollm135m_fp16_100samp: 40.0
      smollm135m_int4_standard_100samp: 39.0
      smollm135m_int4_int3range_100samp: 32.0
      paper_135m_fp16: 37.2
      paper_135m_static4bit: 33.6
    note: >
      FP16 confirmed (+2.8pp, within noise). int4_int3range=32.0% vs paper's 33.6% (-1.6pp).
      Standard INT4 lossless pattern holds cross-model (39.0% vs paper's 33.6%).
      SmolLM-1.7B not yet tested (larger model, slower on CPU).

