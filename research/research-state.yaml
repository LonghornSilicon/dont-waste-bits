      beta_0_5: {acc: 39.0, avg_bits: 3.92, val_acc: 0.341, bit_dist: {2: 37.0, 4: 57.4, 16: 5.5}}
      beta_1_0: {acc: 32.0, avg_bits: 2.00, val_acc: 0.257, bit_dist: {2: 100}}
      beta_2_0: {acc: 32.0, avg_bits: 2.00, val_acc: 0.227, bit_dist: {2: 100}}
    log: research/data/beta_sweep_run.log
    question: "Does higher latency penalty beta resolve dual-objective tension (bring avg_bits to ~5.05)?"
    conclusion: >
      CONFIRMED — all 4 betas complete. No beta achieves paper's 41.2% at 5.05 bits.
      beta=0.1: 39.0% @ 5.30 bits (closest to paper bits, 2.2pp accuracy gap).
      beta=0.5: 39.0% @ 3.92 bits (same accuracy, lower bits — no benefit).
      beta=1.0: COLLAPSE — 100% 2-bit, acc=32.0%, val_acc=0.257 (BELOW random 0.25).
      beta=2.0: COLLAPSE — 100% 2-bit, acc=32.0%, val_acc=0.227 (BELOW random 0.25).
      Dual-objective tension is FUNDAMENTAL — compound loss is the essential missing ingredient.

