critical_findings:
  - "Original code not released (CVPR June 2026) — re-implemented from equations"
  - "KV cache quantization must hook k_proj/v_proj, NOT model weights or past_key_values"
  - "transformers 5.x uses DynamicCache — tuple-hunting hooks silently fail"
  - "Paper uses unnormalized acc metric (~42%), NOT acc_norm (~54%)"
  - "INT4 losslessness is SCALE-DEPENDENT: lossless at 135M/360M (15 heads), lossy at 1.7B (32 heads)"
  - "Mechanism fully quantified: eff_residual=rel_error*cancel_ratio — 8.1% at 360M (below threshold), 12.4% at 1.7B (above)"
  - "Root cause: hidden_dim 2048 vs 960 -> higher KV variance -> larger errors at same scale divisor"
  - "DWB controller: C_t dominates (d=4.55), R_t barely helps (d=0.52); val_acc=45.6% vs 25% random"
  - "H3 IMPL_GAP: DWB v1 (100 train, 5 epochs, val_acc=36.6%) gives 33.8% — worse than standard INT4 (41.6%) at MORE bits (5.03)"
  - "Beta sweep confirms dual-objective tension: beta=0.1 → 39.0%@5.30b; beta=0.5 → 37.0%@3.06b. No beta achieves 41.2%@5.05b."
  - "int4_int3range (scale=max/3, 8 levels) reproduces 135M/360M baseline; coarse step causes all -18pp (ablation)"
  - "DWB-TurboQuant: +2pp HellaSwag, +3pp ARC-Challenge at identical 5.05 avg_bits"
  - "DWB-TurboQuant BoolQ: -20pp regression (41% vs DWB-scalar 61%) — WHT gains are task-specific, hurt closed-form yes/no QA"

