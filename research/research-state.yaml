project: dont-waste-bits-verification
created: "2026-04-19"
last_updated: "2026-04-19"

research_question: >
  Can we independently reproduce the claims of "Don't Waste Bits! Adaptive KV-Cache
  Quantization for Lightweight On-Device LLMs" (arXiv:2604.04722)?
  Specifically: (H1) 17.75% latency reduction, (H2) +7.60 accuracy points over
  static 4-bit KV, (H3) within 0.30 points of FP16 — all on SmolLM-360M / HellaSwag.

phase: INNER_LOOP  # BOOTSTRAP | INNER_LOOP | OUTER_LOOP | CONCLUDED

hypotheses:
  H1:
    slug: H1-latency-reduction
    claim: "17.75% decoding latency reduction vs static 4-bit KV (SmolLM-360M, HellaSwag)"
    arithmetic_check: "(2.93 - 2.41) / 2.93 * 100 = 17.75% — VERIFIED from paper Table 3"
    status: AWAITING_BREV  # UNTESTED | ARITHMETIC_VERIFIED | RUNNING | CONFIRMED | REFUTED
    prediction: Reproduces within ±2% of reported values
    priority: HIGH
    blocker: "RTX 4090 required on NVIDIA Brev"

  H2:
    slug: H2-accuracy-improvement
    claim: "+7.60 accuracy points over static 4-bit KV (SmolLM-360M, HellaSwag)"
    arithmetic_check: "41.20 - 33.60 = 7.60 — VERIFIED from paper Table 3"
    status: RUNNING
    prediction: Reproduces within ±1 accuracy point
    priority: HIGH
    current_run: "kv_quant_v2 — corrected hooks on k_proj/v_proj (100 samples, CPU)"

  H3:
    slug: H3-fp16-parity
    claim: "Within 0.30 points of FP16 (SmolLM-360M, HellaSwag)"
    arithmetic_check: "41.50 - 41.20 = 0.30 — VERIFIED from paper Table 3"
    status: RUNNING
    prediction: Reproduces; gap may vary due to random seed
    priority: HIGH
    current_run: "kv_quant_v2 — corrected hooks on k_proj/v_proj (100 samples, CPU)"

  H4:
    slug: H4-additional-models
    claim: "Results hold across SmolLM-135M and SmolLM-1.7B"
    status: UNTESTED
    priority: MEDIUM

