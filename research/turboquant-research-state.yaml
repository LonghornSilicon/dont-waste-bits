project: dwb-turboquant-integration
created: "2026-04-19"
last_updated: "2026-04-19"
branch: turboquant-integration

research_question: >
  Does using Don't Waste Bits! as a precursor token importance ranker
  for TurboQuant improve accuracy vs DWB alone with scalar 2-bit,
  while maintaining compression ratio?

phase: RUNNING  # TQ-H2 in progress

hypotheses:
  TQ-H1:
    slug: polarquant-recovery
    claim: "PolarQuant (vector quantization) > scalar 2-bit for uniformly-quantized KV"
    prediction: "+3pp or more over scalar 2-bit on HellaSwag"
    status: CONFIRMED
    result:
      fp16: 41.0
      scalar_2bit: 22.0
      polar_quant_3b2b: 27.0
      recovery_over_scalar: +5.0
      threshold: 3.0
    note: >
      Per-head WHT rotation (head_dim=64) recovers +5pp over scalar 2-bit.
      Critical bug found and fixed: must rotate per head (64-dim), not full KV (320-dim).
      Full-tensor rotation gives ~20% (near random) — destroys inter-head structure.
    implementation: research/src/turboquant_impl.py

  TQ-H2:
    slug: dwb-turboquant-pipeline
    claim: "DWB-TurboQuant > DWB-scalar on HellaSwag accuracy"
    prediction: "+2 to +5pp over DWB-scalar via PolarQuant at 2-bit tier"
    status: RUNNING  # ~60/100 samples
    baselines:
      dwb_scalar: 40.0  # from current run and previous eval_dwb.py results
      fp16: 42.6         # from main branch 500-samp

  TQ-H3:
    slug: reasoning-benefit
    claim: "Benefit larger on reasoning benchmarks (ARC-C) vs HellaSwag"
    status: UNTESTED
    priority: MEDIUM

baselines_from_main:
  smollm360m_fp16_500samp: 42.6
  smollm360m_dwb_200samp: 38.0
  smollm360m_dwb_bit_dist: {2: 57.3, 4: 18.9, 8: 8.3, 16: 15.6}
  smollm360m_dwb_avg_bits: 5.05

implementation:
  polarquant: research/src/turboquant_impl.py  # self-contained, no external deps
  tq_h1_eval: research/src/run_turboquant_eval.py
  tq_h2_eval: research/src/run_turboquant_h2.py
  key_insight: >
    Must reshape k/v proj output to [batch*seq*n_heads, head_dim] before WHT rotation.
    SmolLM-360M: n_kv_heads=5, head_dim=64. Full KV proj output = [batch, seq, 320].
    Rotating 320-dim (padded to 512) mixes all 5 heads → destroys structure → ~20% acc.
    Rotating per head (64-dim per head) → correct → 27% (+5pp over scalar 2-bit).

next_steps:
  - Record TQ-H2 result when eval completes
  - Commit results + update turboquant-findings.md
  - Consider TQ-H3 (ARC-Challenge) if TQ-H2 shows improvement
  - Latency of PolarQuant add-on (GPU required for meaningful numbers)
